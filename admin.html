<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Mikael's Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">Mikael's Gallery</a>
      <nav class="nav">
        <a href="index.html">Galerie</a>
        <a href="about.html">À propos</a>
        <a href="contact.html">Contact</a>
        <a href="admin.html" class="active">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="login-view" class="admin-login">
      <h1>Espace Admin</h1>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;">Connectez-vous pour gérer les œuvres.</p>
      <input type="password" id="password" placeholder="Mot de passe" />
      <button class="btn" id="login-btn">Se connecter</button>
      <p style="color:var(--muted);font-size:0.75rem;margin-top:1rem;">Démo : <code>mikael2026</code></p>
    </div>

    <section id="admin-view" class="admin-page" style="display:none;">
      <h1 style="font-size:2.2rem;margin-bottom:1.5rem;">Tableau de bord</h1>

      <div class="admin-stats" id="stats"></div>

      <div class="admin-section-title">
        <h2>Œuvres</h2>
        <button class="btn" id="new-btn">+ Nouvelle œuvre</button>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th></th>
            <th>Titre</th>
            <th>Catégorie</th>
            <th>Prix</th>
            <th>Statut</th>
            <th>Ventes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="admin-rows"></tbody>
      </table>
    </section>

    <div id="modal" class="modal-backdrop hidden">
      <div class="modal">
        <h2 id="modal-title">Nouvelle œuvre</h2>
        <form id="art-form">
          <input type="hidden" id="f-id" />
          <div class="form-row"><label>Titre</label><input id="f-title" required /></div>
          <div class="form-row"><label>Description</label><textarea id="f-description"></textarea></div>
          <div class="form-row"><label>Catégorie</label>
            <select id="f-category">
              <option value="paysage">Paysage</option>
              <option value="abstrait">Abstrait</option>
              <option value="portrait">Portrait</option>
              <option value="nature">Nature</option>
            </select>
          </div>
          <div class="form-row"><label>Dimensions</label><input id="f-dimensions" placeholder="60 x 80 cm" /></div>
          <div class="form-row"><label>Technique</label><input id="f-technique" /></div>
          <div class="form-row"><label>Année</label><input id="f-year" type="number" /></div>
          <div class="form-row"><label>Prix (€)</label><input id="f-price" type="number" required /></div>
          <div class="form-row"><label>Image (URL)</label><input id="f-image" placeholder="https://..." /></div>
          <div class="form-row"><label>Image (upload)</label><input id="f-upload" type="file" accept="image/*" /></div>
          <div class="form-row"><label>Statut</label>
            <select id="f-status">
              <option value="available">Disponible</option>
              <option value="sold">Vendue</option>
            </select>
          </div>
          <div class="form-row"><label>Tags</label>
            <label style="display:inline-flex;gap:.4rem;align-items:center;margin-right:1rem;text-transform:none;color:var(--text);">
              <input type="checkbox" id="f-tag-new" /> Nouveau
            </label>
            <label style="display:inline-flex;gap:.4rem;align-items:center;text-transform:none;color:var(--text);">
              <input type="checkbox" id="f-tag-best" /> Best-seller
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancel-btn">Annuler</button>
            <button type="submit" class="btn">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 Mikael's Gallery — Tous droits réservés</p>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
