<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Mikael's Gallery</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23161628'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Georgia,serif' font-size='34' font-weight='600' fill='%23fff'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" as="style" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" /></noscript>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="login-view" class="admin-login">
      <h1>Espace Admin</h1>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;">Connectez-vous pour gérer les œuvres.</p>
      <label for="password" class="visually-hidden">Mot de passe</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Mot de passe" />
      <button class="btn" id="login-btn">Se connecter</button>
      <p style="color:var(--muted);font-size:0.75rem;margin-top:1rem;">Démo : <code>mikael2026</code></p>
    </div>

    <section id="admin-view" class="admin-page" style="display:none;">
      <div class="admin-header">
        <h1>Tableau de bord</h1>
        <div class="admin-header-actions">
          <button class="btn btn-secondary" id="reset-btn">Réinitialiser</button>
          <button class="btn btn-secondary" id="logout-btn">Déconnexion</button>
        </div>
      </div>

      <div class="admin-stats" id="stats"></div>

      <div class="admin-section-title">
        <h2>Œuvres</h2>
        <button class="btn" id="new-btn">+ Nouvelle œuvre</button>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th><span class="visually-hidden">Aperçu</span></th>
            <th>Titre</th>
            <th>Catégorie</th>
            <th>Prix</th>
            <th>Statut</th>
            <th>Ventes</th>
            <th><span class="visually-hidden">Actions</span></th>
          </tr>
        </thead>
        <tbody id="admin-rows"></tbody>
      </table>
    </section>

    <div id="modal" class="modal-backdrop hidden">
      <div class="modal">
        <h2 id="modal-title">Nouvelle œuvre</h2>
        <form id="art-form">
          <input type="hidden" id="f-id" />
          <div class="form-row"><label for="f-title">Titre</label><input id="f-title" required /></div>
          <div class="form-row"><label for="f-description">Description</label><textarea id="f-description"></textarea></div>
          <div class="form-row"><label for="f-category">Catégorie</label>
            <select id="f-category">
              <option value="paysage">Paysage</option>
              <option value="abstrait">Abstrait</option>
              <option value="portrait">Portrait</option>
              <option value="nature">Nature</option>
            </select>
          </div>
          <div class="form-row"><label for="f-dimensions">Dimensions</label><input id="f-dimensions" placeholder="60 x 80 cm" /></div>
          <div class="form-row"><label for="f-technique">Technique</label><input id="f-technique" /></div>
          <div class="form-row"><label for="f-year">Année</label><input id="f-year" type="number" min="1900" max="2100" /></div>
          <div class="form-row"><label for="f-price">Prix (€)</label><input id="f-price" type="number" min="0" step="10" required /></div>
          <div class="form-row"><label for="f-image">Image (URL)</label><input id="f-image" placeholder="https://..." /></div>
          <div class="form-row"><label for="f-upload">Image (upload)</label><input id="f-upload" type="file" accept="image/*" /></div>
          <div class="form-row"><label for="f-status">Statut</label>
            <select id="f-status">
              <option value="available">Disponible</option>
              <option value="sold">Vendue</option>
            </select>
          </div>
          <div class="form-row"><span class="form-row-label">Tags</span>
            <label style="display:inline-flex;gap:.4rem;align-items:center;margin-right:1rem;text-transform:none;color:var(--text);">
              <input type="checkbox" id="f-tag-new" /> Nouveau
            </label>
            <label style="display:inline-flex;gap:.4rem;align-items:center;text-transform:none;color:var(--text);">
              <input type="checkbox" id="f-tag-best" /> Best-seller
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancel-btn">Annuler</button>
            <button type="submit" class="btn">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="data/artworks.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
