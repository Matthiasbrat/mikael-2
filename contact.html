<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Mikael's Gallery</title>
  <meta name="description" content="Contactez Mikael pour une question, une commande ou une collaboration." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232d1b69'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Georgia,serif' font-size='34' font-weight='600' fill='%23fff'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" as="style" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" /></noscript>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="contact-page">
      <h1>Contact</h1>
      <p>Une question, une commande, une collaboration ? Écrivez-moi.</p>

      <div class="contact-grid">
        <form id="contact-form" novalidate>
          <div class="form-row">
            <label for="name">Nom</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-row">
            <label for="subject">Sujet</label>
            <select id="subject" name="subject">
              <option>Renseignement sur une œuvre</option>
              <option>Commande personnalisée</option>
              <option>Exposition / Collaboration</option>
              <option>Autre</option>
            </select>
          </div>
          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn">Envoyer</button>
        </form>

        <aside class="contact-info">
          <h2>Studio</h2>
          <p>14 rue des Lumières<br />75011 Paris, France</p>
          <p><a href="mailto:hello@mikaelsgallery.art">hello@mikaelsgallery.art</a></p>
          <p>+33 (0)1 23 45 67 89</p>
          <h2>Réseaux</h2>
          <p><a href="#">Instagram</a> · <a href="#">Behance</a> · <a href="#">Vimeo</a></p>
        </aside>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="data/artworks.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
