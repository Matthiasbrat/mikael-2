name: Lighthouse

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # @lhci/cli does not bundle Chrome; it relies on chrome-launcher finding
      # an existing binary. On ubuntu-24.04 runners chrome-launcher can fail
      # to locate the preinstalled Chrome, so we install one explicitly.
      # This action sets CHROME_PATH in the environment automatically.
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm install

      - name: Show environment
        run: |
          node --version
          npx lhci --version
          echo "CHROME_PATH=$CHROME_PATH"
          ls -la

      # continue-on-error: true so assertion failures don't prevent the
      # artifact upload step from running.
      - name: Run Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: List Lighthouse output
        if: always()
        run: ls -la .lighthouseci/ 2>/dev/null || echo "No .lighthouseci directory was created"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: warn
