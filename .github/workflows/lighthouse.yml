name: Lighthouse

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Serve the static site on a known port so Lighthouse can crawl it.
      # We use a simple http-server rather than lhci's built-in staticDistDir
      # because treosh/lighthouse-ci-action handles Chrome + lhci invocation
      # cleanly when given explicit URLs.
      - name: Install and start http-server
        run: |
          npm install -g http-server
          nohup http-server . -p 8080 --silent > /tmp/http-server.log 2>&1 &
          # Wait until the server actually accepts connections (fail fast if not)
          for i in {1..20}; do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 0.5
          done
          echo "Server failed to start"; cat /tmp/http-server.log; exit 1

      # treosh's action bundles everything we need: it installs @lhci/cli,
      # sets up Chrome, runs lighthouse against the given URLs, uploads the
      # reports to Lighthouse's temporary public storage (shareable URLs
      # printed in the job summary) and as a GitHub Actions artifact.
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/about.html
            http://localhost:8080/contact.html
            http://localhost:8080/cart.html
            http://localhost:8080/artwork.html?id=1
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
