<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikael's Gallery — Life under a new angle</title>
  <meta name="description" content="Galerie d'art de Mikael : peintures, photographies et œuvres originales." />
  <meta property="og:title" content="Mikael's Gallery" />
  <meta property="og:description" content="Life under a new angle." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23161628'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Georgia,serif' font-size='34' font-weight='600' fill='%23fff'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="image" href="https://picsum.photos/seed/purple/600/750" fetchpriority="high" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" as="style" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" /></noscript>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="hero">
      <h1>Mikael's Gallery</h1>
      <p class="tagline">Life under a new angle.</p>
    </section>

    <div class="filter-bar">
      <div class="filter-row">
        <div class="cat-tabs">
          <button class="cat-btn active" data-cat="all">Tout</button>
          <button class="cat-btn" data-cat="paysage">Paysage</button>
          <button class="cat-btn" data-cat="abstrait">Abstrait</button>
          <button class="cat-btn" data-cat="portrait">Portrait</button>
          <button class="cat-btn" data-cat="nature">Nature</button>
        </div>
        <div class="filter-selects">
          <select id="price-filter" aria-label="Filtrer par prix">
            <option value="">Prix</option>
            <option value="0-500">&lt; 500 CHF</option>
            <option value="500-1000">500 – 1 000 CHF</option>
            <option value="1000-2000">1 000 – 2 000 CHF</option>
            <option value="2000+">2 000+ CHF</option>
          </select>
          <select id="medium-filter" aria-label="Filtrer par medium">
            <option value="">Medium</option>
            <option value="Peinture">Peinture</option>
            <option value="Photographie">Photographie</option>
            <option value="Dessin">Dessin</option>
            <option value="Technique mixte">Technique mixte</option>
          </select>
          <select id="sort-select" aria-label="Trier">
            <option value="recent">Récents</option>
            <option value="bestseller">Populaires</option>
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix décroissant</option>
          </select>
        </div>
      </div>
      <div id="active-filters" class="active-filters"></div>
    </div>

    <section class="gallery" id="gallery"></section>
  </main>

  <div id="site-footer"></div>

  <script src="data/artworks.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
