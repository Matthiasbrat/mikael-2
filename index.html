<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikael's Gallery — Life under a new angle</title>
  <meta name="description" content="Galerie d'art de Mikael : peintures, photographies et œuvres originales. Life under a new angle." />
  <meta property="og:title" content="Mikael's Gallery" />
  <meta property="og:description" content="Life under a new angle." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">Mikael's Gallery</a>
      <nav class="nav">
        <a href="index.html" class="active">Galerie</a>
        <a href="about.html">À propos</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="cart-link" aria-label="Panier">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge hidden">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Mikael's Gallery</h1>
      <p>Life under a new angle.</p>
    </section>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="all">Tout</button>
      <button class="filter-btn" data-cat="paysage">Paysage</button>
      <button class="filter-btn" data-cat="abstrait">Abstrait</button>
      <button class="filter-btn" data-cat="portrait">Portrait</button>
      <button class="filter-btn" data-cat="nature">Nature</button>
      <select id="sort">
        <option value="recent">Ajouts récents</option>
        <option value="bestseller">Plus vendus</option>
        <option value="price-asc">Prix croissant</option>
        <option value="price-desc">Prix décroissant</option>
      </select>
    </div>

    <section class="gallery" id="gallery"></section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Mikael's Gallery — Tous droits réservés</p>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
